<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div id="lobby" class="state">
            <div class="vs-container">
                <div class="vs-player">
                    <img id="deco-wham" src="" alt="Wham" class="deco-img">
                    <span>Wham (X)</span>
                </div>
                <div class="vs-text">VS</div>
                <div class="vs-player">
                    <img id="deco-gaby" src="" alt="Gaby" class="deco-img">
                    <span>Gaby (O)</span>
                </div>
            </div>

            <div class="card">
                <h3>Votre Code</h3>
                <div id="my-code" class="code-display">------</div>
                <p>Partagez ce code avec un ami</p>
            </div>
            <div class="divider">OU</div>
            <div class="card">
                <h3>Rejoindre avec le code d'un ami</h3>
                <input type="text" id="join-code" placeholder="Code (ex: K7P2XR)" maxlength="6">
                <p class="input-hint">Les lettres peuvent être en minuscules ou majuscules</p>
                <button id="join-btn">Rejoindre</button>
            </div>
        </div>

        <div id="waiting" class="state hidden">
            <div class="loader"></div>
            <p>En attente de l'adversaire...</p>
        </div>

        <div id="game" class="state hidden">
            <div class="status-bar">
                <div id="role-indicator">Vous jouez : <span id="my-symbol" class="badge">-</span></div>
                <div id="turn-indicator">Tour : <span id="current-turn" class="badge">-</span></div>
            </div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <div id="game-message" class="message"></div>
            <button id="rematch-btn" class="hidden">Rejouer</button>
        </div>

        <footer>
            <p>SamaLAiFait - MS03042026</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
